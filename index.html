<style>

:root{--bg:#f4f7f5;--s1:#fff;--s2:#f0f4f1;--s3:#e8efe9;--bd:#d4e4d8;--bd2:#b8d4c0;--g:#1a7a4a;--gm:#22a060;--gl:#4db87a;--g2:#e8f5ee;--g3:#d0ebda;--t:#0d6e6e;--tl:#1a9999;--t2:#e6f5f5;--r:#c0392b;--r2:#fdecea;--y:#a07000;--y2:#fef9e7;--yl:#e0b030;--v:#5b4fcf;--v2:#ede9fb;--tx:#1a2e24;--mu:#5a7a66;--hi:#9ab8a4;--fn:'Inter',sans-serif;--mo:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px;min-height:100vh}
button{cursor:pointer;font-family:var(--fn);border:none;outline:none;transition:all .15s}
input,select,textarea{background:var(--s1);border:1.5px solid var(--bd2);color:var(--tx);border-radius:8px;padding:8px 12px;font-family:var(--fn);font-size:13px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gm);box-shadow:0 0 0 3px var(--g2)}
.bg{background:var(--gm);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-weight:600;font-size:13px}
.bg:hover{background:var(--g)}
.bgl{background:var(--g2);border:1.5px solid var(--gl);color:var(--g);padding:9px 18px;border-radius:9px;font-weight:600;font-size:13px}
.bgl:hover{background:var(--g3)}
.bt2{background:var(--t2);border:1.5px solid var(--tl);color:var(--t);padding:7px 13px;border-radius:8px;font-size:12px;font-weight:500}
.bv2{background:var(--v2);border:1.5px solid var(--v);color:var(--v);padding:7px 13px;border-radius:8px;font-size:12px;font-weight:500}
.br{background:var(--r2);border:1.5px solid var(--r);color:var(--r);padding:7px 13px;border-radius:8px;font-size:12px}
.bn{background:var(--s2);border:1.5px solid var(--bd2);color:var(--mu);padding:7px 13px;border-radius:8px;font-size:12px}
.bn:hover{border-color:var(--gm);color:var(--g)}
.bwa{background:none;border:1.5px solid #25a24455;color:#25a244;padding:6px 11px;border-radius:8px;font-size:11px;font-family:var(--fn)}
.bwa:hover{background:#25a24415}
.card{background:var(--s1);border:1.5px solid var(--bd);border-radius:16px;padding:18px 22px}
.csm{background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:10px 13px}
.tag{display:inline-block;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}
.tg{background:var(--g2);color:var(--g);border:1px solid var(--gl)}
.tr{background:var(--r2);color:var(--r);border:1px solid #e08080}
.ty{background:var(--y2);color:var(--y);border:1px solid var(--yl)}
.tn{background:var(--s3);color:var(--mu);border:1px solid var(--bd)}
.tv{background:var(--v2);color:var(--v);border:1px solid #a090e0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.topbar{background:var(--s1);border-bottom:1.5px solid var(--bd);padding:0 24px;display:flex;align-items:center;height:54px;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px #00000008}
.logo{font-size:16px;font-weight:700;color:var(--g);letter-spacing:-.02em}
.sep{width:1px;height:18px;background:var(--bd2)}
.sub{font-size:11px;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;font-weight:500}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:18px 24px 12px}
.kpi{background:var(--s1);border:1.5px solid var(--bd);border-radius:16px;padding:16px 20px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.kg::after{background:linear-gradient(90deg,var(--gm),var(--gl))}
.kr::after{background:linear-gradient(90deg,var(--r),#e74c3c)}
.ky::after{background:linear-gradient(90deg,var(--y),var(--yl))}
.kt::after{background:linear-gradient(90deg,var(--t),var(--tl))}
.kpi-l{font-size:11px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.kpi-v{font-family:var(--mo);font-size:26px;font-weight:600;line-height:1}
.kpi-s{font-size:11px;color:var(--hi);margin-top:4px}
.sh{display:flex;justify-content:space-between;align-items:center;padding:0 24px 12px}
.sh-t{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.cl-list{padding:0 24px 80px;display:flex;flex-direction:column;gap:7px}

.tc{padding:18px 24px 60px}

  }
 
  // CONSIGLI GENERALI PERFORMANCE
  consigli.push({icon:"⚡",title:"Ottimizzazione del recupero",text:"Il recupero avviene durante il sonno: nelle prime 2 ore si concentra il 70% della secrezione di GH (ormone della crescita). Un sonno disturbato abbassa i livelli di IGF-1 e rallenta la sintesi proteica muscolare. Pre-sleep: 30g di caseina o 200g di yogurt greco con frutta secca."});
  consigli.push({icon:"💧",title:"Idratazione e performance",text:"Una disidratazione del 2% riduce la forza muscolare del 10% e la resistenza del 20%. Target per atleti: 35-40ml/kg di peso corporeo. Aggiungere 500ml per ogni ora di allenamento. Sodio: 1.5-2g/die essenziale per la ritenzione idrica intracellulare e la funzione muscolare."});
 
  if(!c.integ.some(x=>x.toLowerCase().includes("omega"))){
    integConsigli.push("Omega-3 EPA/DHA 2-3g/die: riducono l'infiammazione muscolare post-esercizio del 35% e aumentano la sensibilita insulinica nei muscoli.");
  }

  }
 
  prossimi.push("Prossimo check tra 14 giorni: foto + peso + bio-feedback completo (energia, sonno, stress, RPE, aderenza macro).");
  prossimi.push("Rivedere il timing dei pasti: carboidrati principalmente nelle 2 ore pre e post allenamento per massimizzare la finestra anabolica.");

function generaPianoAlimentare(c){
  const k=c.macro.k||2000;
  const p=c.macro.p||150;
  const carbo=c.macro.c||200;
  const g=c.macro.g||65;
  const w=c.macro.w||2.5;
 
  const pasti=[
    {
      ora:"07:00 - Colazione",
      cibo:`Uova intere 3 (18g P, 12g G) + Albumi 3 (11g P) | Fiocchi d'avena 80g (56g C) con frutti di bosco 100g | Caffe americano senza zucchero`,
      macro:`~350 kcal | P: 29g | C: 62g | G: 12g`
    },
    {
      ora:"10:00 - Spuntino",
      cibo:`Yogurt greco 0% 200g (20g P) | Mandorle 20g (3g P, 10g G) | Mela media`,
      macro:`~280 kcal | P: 23g | C: 28g | G: 11g`
    },
    {
      ora:"13:00 - Pranzo",
      cibo:`Pollo/tacchino 200g (44g P) OPPURE Merluzzo/nasello 250g (45g P) | Riso/pasta integrale ${Math.round(carbo*0.3)}g | Verdure a volonta (spinaci, zucchine, insalata) | Olio EVO 10g (9g G)`,
      macro:`~${Math.round(k*0.3)} kcal | P: ${Math.round(p*0.35)}g | C: ${Math.round(carbo*0.3)}g | G: ${Math.round(g*0.2)}g`
    },
    {
      ora:"16:00 - Pre-Workout (90 min prima)",
      cibo:`Banana grande (27g C) + Riso soffiato/rice crispies 40g (32g C) | Whey protein 30g (22g P) con acqua`,
      macro:`~280 kcal | P: 22g | C: 59g | G: 2g`
    },
    {
      ora:"19:30 - Post-Workout (entro 60 min)",
      cibo:`Salmone 180g (36g P, 11g G) OPPURE Manzo magro 180g (38g P) | Patate/riso ${Math.round(carbo*0.25)}g | Verdure grigliate`,
      macro:`~${Math.round(k*0.28)} kcal | P: ${Math.round(p*0.35)}g | C: ${Math.round(carbo*0.25)}g | G: ${Math.round(g*0.25)}g`
    },
    {
      ora:"22:00 - Pre-Sleep",
      cibo:`Ricotta magra 200g (24g P) OPPURE Yogurt greco 0% 200g (20g P) | Noci 20g (4g P, 12g G) | Caseina proteica opzionale`,
      macro:`~240 kcal | P: ${Math.round(p*0.2)}g | C: 8g | G: ${Math.round(g*0.2)}g`
    }
  ];
 
  const integStack=[];
  if(!c.integ.some(x=>x.toLowerCase().includes("omega")))integStack.push("Omega-3 EPA/DHA 2g - ai pasti principali");
  if(!c.integ.some(x=>x.toLowerCase().includes("creatina")))integStack.push("Creatina monoidrato 5g - qualsiasi momento della giornata");
  if(!c.integ.some(x=>x.toLowerCase().includes("magnesio")))integStack.push("Magnesio bisglicinato 400mg - 30 min prima di dormire");
  integStack.push("Vitamina D3 2000-4000 UI - mattina con il pasto");
  c.integ.forEach(x=>integStack.push(x));
 
  return {pasti,integStack,k,p,carbo,g,w};
}

function rMod(){if(!MD)return"";const c=SID?CL.find(x=>x.id===SID):null;if(MD==="add")return mW(mAdd());if(MD==="ack"&&c)return mW(mACK(c));if(MD==="eck"&&c&&ECI!==null)return mW(mECK(c));if(MD==="ecl"&&c)return mW(mECL(c));if(MD==="emac"&&c)return mW(mEMAC(c));if(MD==="edt"&&c)return mW(mEDT(c));if(MD==="epn"&&c)return mW(mEPN(c));if(MD==="wa"&&c)return rWA(c);return"";}
const mW=h=>`<div class="mbg" onclick="if(event.target===this)CM()"><div class="mbx">${h}</div></div>`;
 
function mAdd(){return`<div class="mt">Nuovo cliente</div><div class="g2"><div><label class="fl">Nome</label><input id="fn"></div><div><label class="fl">Cognome</label><input id="fc"></div><div><label class="fl">Email</label><input id="fe" type="email"></div><div><label class="fl">Telefono</label><input id="ft"></div><div><label class="fl">Anno nascita</label><input id="fd2" placeholder="2000"></div><div><label class="fl">Altezza (cm)</label><input id="fh" type="number"></div><div><label class="fl">Peso iniziale (kg)</label><input id="fw" type="number" step="0.1"></div><div><label class="fl">Prezzo (EUR)</label><input id="fp" type="number"></div><div><label class="fl">Scad. pagamento</label><input id="fs" type="date"></div></div><div><label class="fl">Obiettivo</label><input id="fo" placeholder="Es. Body recomp + definizione"></div><div style="display:flex;align-items:center;gap:8px;margin-top:10px"><input type="checkbox" id="fpd"><label style="font-size:13px;color:var(--mu);margin:0">Pagamento gia ricevuto</label></div><div class="ma"><button class="bn" onclick="CM()">Annulla</button><button class="bg" style="flex:1" onclick="SUB()">Aggiungi cliente</button></div>`;}
 
function mACK(c){const t=new Date().toISOString().split("T")[0];return`<div class="mt">Nuovo check - ${c.nome}</div><div class="g2"><div><label class="fl">Data</label><input id="cd" type="date" value="${t}"></div><div><label class="fl">Peso (kg)</label><input id="cw" type="number" step="0.1"></div></div><div class="g3"><div><label class="fl">Energia (1-10)</label><input id="ce" type="number" min="1" max="10"></div><div><label class="fl">Sonno (1-10)</label><input id="cs" type="number" min="1" max="10" step="0.5"></div><div><label class="fl">Stress (1-10)</label><input id="cst" type="number" min="1" max="10"></div><div><label class="fl">RPE sessione</label><input id="cr" type="number" min="1" max="10"></div><div><label class="fl">Idratazione (L)</label><input id="ch" type="number" step="0.1"></div><div><label class="fl">Aderenza macro (%)</label><input id="ca" type="number"></div><div><label class="fl">Ore sonno</label><input id="co" type="number" step="0.5"></div></div><div class="g2"><div><label class="fl">Performance</label><select id="cp"><option>Migliorate</option><option>Stabili</option><option>Peggiorate</option></select></div><div><label class="fl">Sensazione post-wo</label><input id="cx" placeholder="energico, indolenzito..."></div></div><div><label class="fl">Difficolta principale</label><input id="cdf"></div><div class="ma"><button class="bn" onclick="CM()">Annulla</button><button class="bg" style="flex:1" onclick="SCK(${c.id})">Salva check</button></div>`;}
 
function mECK(c){const ck=c.checks[ECI];if(!ck)return"";return`<div class="mt">Modifica check #${ECI+1}</div><div class="g2"><div><label class="fl">Data</label><input id="cd" type="date" value="${ck.d}"></div><div><label class="fl">Peso (kg)</label><input id="cw" type="number" step="0.1" value="${ck.w||""}"></div></div><div class="g3"><div><label class="fl">Energia</label><input id="ce" type="number" value="${ck.e||""}"></div><div><label class="fl">Sonno</label><input id="cs" type="number" step="0.5" value="${ck.s||""}"></div><div><label class="fl">Stress</label><input id="cst" type="number" value="${ck.st||""}"></div><div><label class="fl">RPE</label><input id="cr" type="number" value="${ck.rpe||""}"></div><div><label class="fl">Idratazione (L)</label><input id="ch" type="number" step="0.1" value="${ck.hy||""}"></div><div><label class="fl">Aderenza (%)</label><input id="ca" type="number" value="${ck.adh||""}"></div><div><label class="fl">Ore sonno</label><input id="co" type="number" step="0.5" value="${ck.hs||""}"></div></div><div class="g2"><div><label class="fl">Performance</label><select id="cp">${["Migliorate","Stabili","Peggiorate"].map(p=>`<option${p===ck.pf?" selected":""}>${p}</option>`).join("")}</select></div><div><label class="fl">Sensazione</label><input id="cx" value="${ck.sx||""}"></div></div><div><label class="fl">Difficolta</label><input id="cdf" value="${ck.diff||""}"></div><div class="ma"><button class="bn" onclick="CM()">Annulla</button><button class="bg" style="flex:1" onclick="SECK(${c.id})">Salva</button></div>`;}
 
function mECL(c){return`<div class="mt">Modifica - ${c.nome}</div><div class="g2"><div><label class="fl">Nome</label><input id="en" value="${c.nome}"></div><div><label class="fl">Cognome</label><input id="ec2" value="${c.cognome}"></div><div><label class="fl">Email</label><input id="ee" value="${c.email}"></div><div><label class="fl">Telefono</label><input id="et" value="${c.tel||""}"></div><div><label class="fl">Anno nascita</label><input id="ed" value="${c.dob||""}"></div><div><label class="fl">Altezza (cm)</label><input id="eh" type="number" value="${c.h}"></div></div><div class="ma"><button class="bn" onclick="CM()">Annulla</button><button class="bg" style="flex:1" onclick="SECL(${c.id})">Salva</button></div>`;}
 
function mEMAC(c){return`<div class="mt">Macro - ${c.nome}</div><div class="g2"><div><label class="fl">Kcal</label><input id="mk" type="number" value="${c.macro.k}"></div><div><label class="fl">Proteine (g)</label><input id="mp" type="number" value="${c.macro.p}"></div><div><label class="fl">Carboidrati (g)</label><input id="mc" type="number" value="${c.macro.c}"></div><div><label class="fl">Grassi (g)</label><input id="mg" type="number" value="${c.macro.g}"></div><div><label class="fl">Idratazione (L)</label><input id="mw" type="number" step="0.1" value="${c.macro.w}"></div><div><label class="fl">Approccio</label><select id="mn"><option value="false"${!c.noM?" selected":""}>Con macro</option><option value="true"${c.noM?" selected":""}>Senza macro</option></select></div></div><div class="ma"><button class="bn" onclick="CM()">Annulla</button><button class="bg" style="flex:1" onclick="SMAC(${c.id})">Salva</button></div>`;}
 
function mEDT(c){return`<div class="mt">Date - ${c.nome}</div><div><label class="fl">Data inizio piano</label><input id="di" type="date" value="${c.start}"></div><div><label class="fl">Scadenza pagamento</label><input id="ds2" type="date" value="${c.scadP||""}"></div><div class="ma"><button class="bn" onclick="CM()">Annulla</button><button class="bg" style="flex:1" onclick="SEDT(${c.id})">Salva</button></div>`;}
 
function mEPN(c){return`<div class="mt">Piano/Prezzo - ${c.nome}</div><div><label class="fl">Obiettivo</label><input id="po" value="${c.obj}"></div><div class="g2"><div><label class="fl">Prezzo totale (EUR)</label><input id="pp" type="number" value="${c.euro}"></div><div><label class="fl">Debito residuo (EUR)</label><input id="pd" type="number" value="${c.debt||0}"></div><div><label class="fl">Pagamento</label><select id="ppd"><option value="true"${c.paid?" selected":""}>Ricevuto</option><option value="false"${!c.paid?" selected":""}>In attesa</option></select></div></div><div class="ma"><button class="bn" onclick="CM()">Annulla</button><button class="bg" style="flex:1" onclick="SEPN(${c.id})">Salva</button></div>`;}
 
function rWA(c){const msg=WA[WK]?.(c)||"";const link=`https://wa.me/${c.tel||""}?text=${encodeURIComponent(msg)}`;const tpls=[["ck_rm","Check"],["py_rm","Pagamento"],["welc","Benvenuto"],["ck_ok","Check OK"],["rin","Rinnovo"]];return`<div class="mbg" onclick="if(event.target===this)CM()"><div class="mbx"><div class="mt">WhatsApp - ${c.nome}</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${tpls.map(([k,l])=>`<button class="bn" style="${WK===k?"border-color:var(--gm);color:var(--g)":""};padding:5px 10px;font-size:11px" onclick="WK=\'${k}\';const ta=document.getElementById(\'wamsg\');if(ta)ta.value=(WA[\'${k}\']?.(CL.find(x=>x.id===${c.id}))||\'\')">${l}</button>`).join("")}</div><label class="fl">Messaggio</label><textarea id="wamsg" rows="8" style="white-space:pre-wrap;margin-bottom:12px">${msg}</textarea><div class="ma"><button class="bn" onclick="CM()">Chiudi</button><a href="${link}" target="_blank" rel="noreferrer" style="flex:2;text-decoration:none"><button class="bg" style="width:100%">Apri WhatsApp</button></a></div></div></div>`;}
 
const gv=id=>{const e=document.getElementById(id);return e?e.value:"";};
const gn=id=>{const v=parseFloat(gv(id));return isNaN(v)?null:v;};
function SC(id){SID=id;VW="cl";TAB="ov";R();}
function GB(){VW="dash";SID=null;R();}
function OM(m){MD=m;R();}
function CM(){MD=null;ECI=null;R();}
function ST(t){TAB=t;R();}
function OW(cid,k){SID=cid;WK=k;MD="wa";R();}
function TP(cid){const c=CL.find(x=>x.id===cid);if(c){c.paid=!c.paid;sv();R();}}
function EC(i){ECI=i;MD="eck";R();}
function DK(cid,i){if(!confirm("Eliminare questo check?"))return;const c=CL.find(x=>x.id===cid);if(c){c.checks.splice(i,1);sv();R();}}
function AI2(cid){const v=prompt("Inserisci integratore:");if(!v)return;const c=CL.find(x=>x.id===cid);if(c){c.integ.push(v);sv();R();}}
function RI2(cid,i){const c=CL.find(x=>x.id===cid);if(c){c.integ.splice(i,1);sv();R();}}
function SO(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.obj=gv("ob_ta");sv();R();}
function SN(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.note=gv("note_ta");sv();R();}
function SUB(){const n=gv("fn"),cg=gv("fc");if(!n||!cg){alert("Nome e cognome obbligatori");return;}const pw=gn("fw");const st=new Date().toISOString().split("T")[0];CL.push({id:Date.now(),nome:n,cognome:cg,email:gv("fe"),tel:gv("ft"),dob:gv("fd2"),h:parseInt(gv("fh"))||0,sx:"M",obj:gv("fo"),note:"",euro:gn("fp")||0,scadP:gv("fs")||null,paid:document.getElementById("fpd")?.checked||false,start:st,integ:[],macro:{k:2000,p:150,c:200,g:65,w:2.5},checks:pw?[{d:st,w:pw,e:0,s:0,st:0,hy:0,adh:0,rpe:0,pf:"Stabili",sx:"",hs:0,diff:""}]:[]});sv();MD=null;R();}
function SCK(cid){const c=CL.find(x=>x.id===cid);if(!c)return;const w=gn("cw");if(!w){alert("Peso obbligatorio");return;}c.checks.push({d:gv("cd"),w,e:gn("ce")||0,s:gn("cs")||0,st:gn("cst")||0,hy:gn("ch")||0,adh:gn("ca")||0,rpe:gn("cr")||0,pf:gv("cp")||"Stabili",sx:gv("cx"),hs:gn("co")||0,diff:gv("cdf")});sv();MD=null;R();}
function SECK(cid){const c=CL.find(x=>x.id===cid);if(!c||ECI===null)return;const w=gn("cw");if(!w)return;c.checks[ECI]={d:gv("cd"),w,e:gn("ce")||0,s:gn("cs")||0,st:gn("cst")||0,hy:gn("ch")||0,adh:gn("ca")||0,rpe:gn("cr")||0,pf:gv("cp")||"Stabili",sx:gv("cx"),hs:gn("co")||0,diff:gv("cdf")};sv();MD=null;ECI=null;R();}
function SECL(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.nome=gv("en");c.cognome=gv("ec2");c.email=gv("ee");c.tel=gv("et");c.dob=gv("ed");c.h=parseInt(gv("eh"))||c.h;sv();MD=null;R();}
function SMAC(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.macro={k:gn("mk")||c.macro.k,p:gn("mp")||c.macro.p,c:gn("mc")||c.macro.c,g:gn("mg")||c.macro.g,w:gn("mw")||c.macro.w};c.noM=gv("mn")==="true";sv();MD=null;R();}
function SEDT(cid){const c=CL.find(x=>x.id===cid);if(!c)return;if(gv("di"))c.start=gv("di");if(gv("ds2"))c.scadP=gv("ds2");sv();MD=null;R();}
function SEPN(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.obj=gv("po")||c.obj;c.euro=gn("pp")||c.euro;c.debt=gn("pd")||0;c.paid=gv("ppd")==="true";sv();MD=null;R();}
 
ld();R();
</script>
</body>
</html>
