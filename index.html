<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f7f5;--s1:#fff;--s2:#f0f4f1;--s3:#e8efe9;--bd:#d4e4d8;--bd2:#b8d4c0;--g:#1a7a4a;--gm:#22a060;--gl:#4db87a;--g2:#e8f5ee;--t:#0d6e6e;--tl:#1a9999;--t2:#e6f5f5;--r:#c0392b;--r2:#fdecea;--y:#a07000;--y2:#fef9e7;--yl:#e0b030;--tx:#1a2e24;--mu:#5a7a66;--hi:#9ab8a4;--fn:'Inter',sans-serif;--mo:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px;min-height:100vh}
button{cursor:pointer;font-family:var(--fn);border:none;outline:none;transition:all .15s}
input,select,textarea{background:var(--s1);border:1.5px solid var(--bd2);color:var(--tx);border-radius:8px;padding:8px 12px;font-family:var(--fn);font-size:13px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gm)}
.btn-g{background:var(--gm);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-weight:600;font-size:13px}
.btn-g:hover{background:var(--g)}
.btn-gl{background:var(--g2);border:1.5px solid var(--gl);color:var(--g);padding:9px 18px;border-radius:9px;font-weight:600;font-size:13px}
.btn-r{background:var(--r2);border:1.5px solid var(--r);color:var(--r);padding:7px 14px;border-radius:8px;font-size:12px}
.btn-n{background:var(--s2);border:1.5px solid var(--bd2);color:var(--mu);padding:7px 14px;border-radius:8px;font-size:12px}
.btn-n:hover{border-color:var(--gm);color:var(--g)}
.btn-wa{background:none;border:1.5px solid #25a24455;color:#25a244;padding:6px 11px;border-radius:8px;font-size:11px;font-family:var(--fn)}
.btn-wa:hover{background:#25a24415}
.card{background:var(--s1);border:1.5px solid var(--bd);border-radius:16px;padding:18px 22px}
.csm{background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:10px 13px}
.tag{display:inline-block;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}
.tg{background:var(--g2);color:var(--g);border:1px solid var(--gl)}
.tr{background:var(--r2);color:var(--r);border:1px solid #e08080}
.ty{background:var(--y2);color:var(--y);border:1px solid var(--yl)}
.tn{background:var(--s3);color:var(--mu);border:1px solid var(--bd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
/* TOPBAR */
.topbar{background:var(--s1);border-bottom:1.5px solid var(--bd);padding:0 24px;display:flex;align-items:center;height:54px;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px #00000008}
.logo{font-size:16px;font-weight:700;color:var(--g);letter-spacing:-.02em}
.sep{width:1px;height:18px;background:var(--bd2)}
.sub{font-size:11px;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;font-weight:500}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:18px 24px 12px}
.kpi{background:var(--s1);border:1.5px solid var(--bd);border-radius:16px;padding:16px 20px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.kg::after{background:linear-gradient(90deg,var(--gm),var(--gl))}
.kr::after{background:linear-gradient(90deg,var(--r),#e74c3c)}
.ky::after{background:linear-gradient(90deg,var(--y),var(--yl))}
.kt::after{background:linear-gradient(90deg,var(--t),var(--tl))}
.kpi-l{font-size:11px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.kpi-v{font-family:var(--mo);font-size:26px;font-weight:600;line-height:1}
.kpi-s{font-size:11px;color:var(--hi);margin-top:4px}
/* CLIENT ROW */
.cl-list{padding:0 24px 80px;display:flex;flex-direction:column;gap:7px}
.sh{display:flex;justify-content:space-between;align-items:center;padding:0 24px 12px}
.sh-t{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.cr{background:var(--s1);border:1.5px solid var(--bd);border-radius:14px;padding:13px 18px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.cr:hover{border-color:var(--gm);box-shadow:0 3px 16px #1a7a4a12}
.cr.urg{border-left:3px solid var(--r)}
.cr-g{display:grid;grid-template-columns:175px 1fr 115px 88px 68px 58px 68px 86px;align-items:center;gap:11px}
.av{width:32px;height:32px;border-radius:50%;background:var(--g2);border:1.5px solid var(--gl);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g);flex-shrink:0}
/* MODAL */
.mbg{position:fixed;inset:0;background:#00000055;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.mbx{background:var(--s1);border:1.5px solid var(--bd);border-radius:18px;padding:28px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px #00000020}
.mt{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--tx)}
.fl{font-size:11px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;font-weight:600;display:block;margin-bottom:4px;margin-top:11px}
.fl:first-child{margin-top:0}
.ma{display:flex;gap:8px;margin-top:18px}
/* DETAIL */
.tbar{display:flex;gap:1px;border-bottom:1.5px solid var(--bd);padding:0 24px;overflow-x:auto}
.tb{background:none;border:none;padding:11px 15px;font-size:13px;color:var(--mu);font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1.5px;cursor:pointer;white-space:nowrap;font-family:var(--fn);transition:color .2s}
.tb.on{color:var(--gm);font-weight:700;border-bottom-color:var(--gm)}
.tc{padding:18px 24px 60px}
/* BARS */
.bw{margin-bottom:11px}
.bl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;color:var(--mu)}
.bv{font-weight:600;font-family:var(--mo)}
.bt{height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}
/* CHECK CARD */
.ck{background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:8px}
.ckh{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
/* NOTIF */
.np{position:absolute;top:calc(100% + 5px);right:0;background:var(--s1);border:1.5px solid var(--bd2);border-radius:14px;width:330px;max-height:400px;overflow-y:auto;z-index:100;box-shadow:0 16px 48px #00000018}
.ni{padding:11px 15px;border-bottom:1.5px solid var(--bd);display:flex;gap:9px;align-items:flex-start}
.ni:last-child{border-bottom:none}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f5ee 0%,#e6f5f5 100%)}
.login-box{background:var(--s1);border:1.5px solid var(--bd);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px #00000015}
.login-logo{font-size:28px;font-weight:700;color:var(--g);margin-bottom:6px;letter-spacing:-.02em}
.login-sub{font-size:13px;color:var(--mu);margin-bottom:28px}
svg.spark{overflow:visible}
.note-box{background:var(--y2);border:1.5px solid var(--yl);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--y);font-weight:600;margin-bottom:11px}
.plan-note{background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:11px 14px;font-size:12px;color:var(--mu);margin-bottom:13px;line-height:1.6}
.integ{display:flex;align-items:center;gap:9px;background:var(--s2);border:1.5px solid var(--bd);border-left:3px solid var(--t);border-radius:9px;padding:9px 12px;margin-bottom:7px;font-size:13px}
.row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1.5px solid var(--bd);font-size:13px}
.row:last-child{border-bottom:none}
.rl{color:var(--mu)}.rv{font-weight:600}
.metric{background:var(--s2);border-radius:9px;padding:10px;text-align:center}
.ml2{font-size:10px;color:var(--mu);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.mv{font-size:17px;font-weight:600;font-family:var(--mo)}
@media(max-width:700px){
  .cr-g{grid-template-columns:1fr 1fr;gap:8px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .g4{grid-template-columns:1fr 1fr}
}
</style>

<div class="card"><div style="font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:12px">Anagrafica</div>
${[["Età",age(c.dob)+" anni"],["Sesso",c.sx==="M"?"Maschile":"Femminile"],["Altezza",c.h+" cm"],["Peso attuale",lk?lk.w+" kg":"—"],["BMI",bmi(c)]].map(([l,v])=>`<div class="row"><span class="rl">${l}</span><span class="rv">${v}</span></div>`).join("")}

<p style="font-size:12px;color:var(--mu);line-height:1.7">${c.note}</p>
${c.debt?`<div class="note-box" style="margin-top:12px">⚠ Debito residuo: €${c.debt}</div>`:""}
${c.urg?`<div class="note-box" style="margin-top:12px;background:var(--r2);border-color:var(--r);color:var(--r)">⚡ Rinnovo urgente — scade ${fd(c.scadP)}</div>`:""}
</div>
${lk?`
<div class="card"><div style="font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:11px">Trend peso</div>
<div style="display:flex;gap:18px;flex-wrap:wrap">
${dl!==null?[["Inizio",f.w+"kg","var(--tx)"],["Attuale",lk.w+"kg","var(--gm)"],["Delta",(dl>=0?"+":"")+dl+"kg",dl<0?"var(--gm)":"var(--r)"]].map(([l,v,a])=>`<div><div style="font-size:10px;color:var(--hi)">${l}</div><div style="font-size:15px;font-weight:600;color:${a};font-family:var(--mo)">${v}</div></div>`).join(""):""}
</div>${svg}</div>

${[["Energia",lk.e,"var(--gm)"],["Sonno",lk.s,"var(--t)"],["Stress",lk.st,"var(--y)"],["RPE",lk.rpe||0,"var(--mu)"]].map(([l,v,a])=>`<div class="bw"><div class="bl"><span>${l}</span><span class="bv" style="color:${a}">${v}/10</span></div><div class="bt"><div class="bf" style="width:${v*10}%;background:${a}"></div></div></div>`).join("")}

function mECK(c){const ck=c.checks[ECI];if(!ck)return"";return`<div class="mt">Modifica check #${ECI+1}</div><div class="g2"><div><label class="fl">Data</label><input id="cd" type="date" value="${ck.d}"></div><div><label class="fl">Peso (kg)</label><input id="cw" type="number" step="0.1" value="${ck.w||""}"></div></div><div class="g3"><div><label class="fl">Energia</label><input id="ce" type="number" value="${ck.e||""}"></div><div><label class="fl">Sonno</label><input id="cs" type="number" step="0.5" value="${ck.s||""}"></div><div><label class="fl">Stress</label><input id="cst" type="number" value="${ck.st||""}"></div><div><label class="fl">RPE</label><input id="cr" type="number" value="${ck.rpe||""}"></div><div><label class="fl">Idratazione (L)</label><input id="ch" type="number" step="0.1" value="${ck.hy||""}"></div><div><label class="fl">Aderenza (%)</label><input id="ca" type="number" value="${ck.adh||""}"></div><div><label class="fl">Ore sonno</label><input id="co" type="number" step="0.5" value="${ck.hs||""}"></div></div><div class="g2"><div><label class="fl">Performance</label><select id="cp">${["Migliorate","Stabili","Peggiorate"].map(p=>`<option${p===ck.pf?" selected":""}>${p}</option>`).join("")}</select></div><div><label class="fl">Sensazione</label><input id="cx" value="${ck.sx||""}"></div></div><div><label class="fl">Difficoltà</label><input id="cdf" value="${ck.diff||""}"></div><div class="ma"><button class="btn-n" onclick="CM()">Annulla</button><button class="btn-g" style="flex:1" onclick="SECK(${c.id})">Salva</button></div>`;}
 
function mECL(c){return`<div class="mt">Modifica — ${c.nome}</div><div class="g2"><div><label class="fl">Nome</label><input id="en" value="${c.nome}"></div><div><label class="fl">Cognome</label><input id="ec2" value="${c.cognome}"></div><div><label class="fl">Email</label><input id="ee" value="${c.email}"></div><div><label class="fl">Telefono</label><input id="et" value="${c.tel||""}"></div><div><label class="fl">Anno nascita</label><input id="ed" value="${c.dob||""}"></div><div><label class="fl">Altezza (cm)</label><input id="eh" type="number" value="${c.h}"></div></div><div class="ma"><button class="btn-n" onclick="CM()">Annulla</button><button class="btn-g" style="flex:1" onclick="SECL(${c.id})">Salva</button></div>`;}
 
function mEMAC(c){return`<div class="mt">Macro — ${c.nome}</div><div class="g2"><div><label class="fl">Kcal</label><input id="mk" type="number" value="${c.macro.k}"></div><div><label class="fl">Proteine (g)</label><input id="mp" type="number" value="${c.macro.p}"></div><div><label class="fl">Carboidrati (g)</label><input id="mc" type="number" value="${c.macro.c}"></div><div><label class="fl">Grassi (g)</label><input id="mg" type="number" value="${c.macro.g}"></div><div><label class="fl">Idratazione (L)</label><input id="mw" type="number" step="0.1" value="${c.macro.w}"></div><div><label class="fl">Approccio</label><select id="mn"><option value="false"${!c.noM?" selected":""}>Con macro</option><option value="true"${c.noM?" selected":""}>Senza macro</option></select></div></div><div class="ma"><button class="btn-n" onclick="CM()">Annulla</button><button class="btn-g" style="flex:1" onclick="SMAC(${c.id})">Salva</button></div>`;}
 
function mEDT(c){return`<div class="mt">Date — ${c.nome}</div><div><label class="fl">Data inizio piano</label><input id="di" type="date" value="${c.start}"></div><div><label class="fl">Scadenza pagamento</label><input id="ds2" type="date" value="${c.scadP||""}"></div><div class="ma"><button class="btn-n" onclick="CM()">Annulla</button><button class="btn-g" style="flex:1" onclick="SEDT(${c.id})">Salva</button></div>`;}
 
function mEPN(c){return`<div class="mt">Piano/Prezzo — ${c.nome}</div><div><label class="fl">Obiettivo</label><input id="po" value="${c.obj}"></div><div class="g2"><div><label class="fl">Prezzo totale (€)</label><input id="pp" type="number" value="${c.euro}"></div><div><label class="fl">Debito residuo (€)</label><input id="pd" type="number" value="${c.debt||0}"></div><div><label class="fl">Pagamento</label><select id="ppd"><option value="true"${c.paid?" selected":""}>Ricevuto</option><option value="false"${!c.paid?" selected":""}>In attesa</option></select></div></div><div class="ma"><button class="btn-n" onclick="CM()">Annulla</button><button class="btn-g" style="flex:1" onclick="SEPN(${c.id})">Salva</button></div>`;}
 
function rWA(c){const msg=WA[WK]?.(c)||"";const link=`https://wa.me/${c.tel||""}?text=${encodeURIComponent(msg)}`;const tpls=[["ck_rm","📋 Check"],["py_rm","💳 Pagamento"],["welc","👋 Benvenuto"],["ck_ok","✅ Check OK"],["rin","🔄 Rinnovo"]];return`<div class="mbg" onclick="if(event.target===this)CM()"><div class="mbx"><div class="mt">WhatsApp — ${c.nome}</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${tpls.map(([k,l])=>`<button class="btn-n" style="${WK===k?"border-color:var(--gm);color:var(--g)":""};padding:5px 10px;font-size:11px" onclick="WK='${k}';const ta=document.getElementById('wamsg');if(ta)ta.value=(WA['${k}'](CL.find(x=>x.id===${c.id}))||'')">${l}</button>`).join("")}</div><label class="fl">Messaggio</label><textarea id="wamsg" rows="8" style="white-space:pre-wrap;margin-bottom:12px">${msg}</textarea><div class="ma"><button class="btn-n" onclick="CM()">Chiudi</button><a href="${link}" target="_blank" rel="noreferrer" style="flex:2;text-decoration:none"><button class="btn-g" style="width:100%">📲 Apri WhatsApp</button></a></div><p style="font-size:11px;color:var(--hi);text-align:center;margin-top:7px">Si apre WA con il testo pronto — premi invio</p></div></div>`;}
 
const gv=id=>{const e=document.getElementById(id);return e?e.value:"";};
const gn=id=>{const v=parseFloat(gv(id));return isNaN(v)?null:v;};
function SC(id){SID=id;VW="cl";TAB="ov";R();}
function GB(){VW="dash";SID=null;R();}
function OM(m){MD=m;R();}
function CM(){MD=null;ECI=null;R();}
function ST(t){TAB=t;R();}
function OW(cid,k){SID=cid;WK=k;MD="wa";R();}
function TP(cid){const c=CL.find(x=>x.id===cid);if(c){c.paid=!c.paid;sv();R();}}
function EC(i){ECI=i;MD="eck";R();}
function DK(cid,i){if(!confirm("Eliminare questo check?"))return;const c=CL.find(x=>x.id===cid);if(c){c.checks.splice(i,1);sv();R();}}
function AI2(cid){const v=prompt("Inserisci integratore (es. Magnesio 400mg sera):");if(!v)return;const c=CL.find(x=>x.id===cid);if(c){c.integ.push(v);sv();R();}}
function RI2(cid,i){const c=CL.find(x=>x.id===cid);if(c){c.integ.splice(i,1);sv();R();}}
function SO(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.obj=gv("ob_ta");sv();R();}
function SN(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.note=gv("note_ta");sv();R();}
function SUB(){const n=gv("fn"),cg=gv("fc");if(!n||!cg){alert("Nome e cognome obbligatori");return;}const pw=gn("fw");const st=new Date().toISOString().split("T")[0];CL.push({id:Date.now(),nome:n,cognome:cg,email:gv("fe"),tel:gv("ft"),dob:gv("fd2"),h:parseInt(gv("fh"))||0,sx:"M",obj:gv("fo"),note:"",euro:gn("fp")||0,scadP:gv("fs")||null,paid:document.getElementById("fpd")?.checked||false,start:st,integ:[],macro:{k:2000,p:150,c:200,g:65,w:2.5},checks:pw?[{d:st,w:pw,e:0,s:0,st:0,hy:0,adh:0,rpe:0,pf:"Stabili",sx:"",hs:0,diff:""}]:[]});sv();MD=null;R();}
function SCK(cid){const c=CL.find(x=>x.id===cid);if(!c)return;const w=gn("cw");if(!w){alert("Peso obbligatorio");return;}c.checks.push({d:gv("cd"),w,e:gn("ce")||0,s:gn("cs")||0,st:gn("cst")||0,hy:gn("ch")||0,adh:gn("ca")||0,rpe:gn("cr")||0,pf:gv("cp")||"Stabili",sx:gv("cx"),hs:gn("co")||0,diff:gv("cdf")});sv();MD=null;R();}
function SECK(cid){const c=CL.find(x=>x.id===cid);if(!c||ECI===null)return;const w=gn("cw");if(!w)return;c.checks[ECI]={d:gv("cd"),w,e:gn("ce")||0,s:gn("cs")||0,st:gn("cst")||0,hy:gn("ch")||0,adh:gn("ca")||0,rpe:gn("cr")||0,pf:gv("cp")||"Stabili",sx:gv("cx"),hs:gn("co")||0,diff:gv("cdf")};sv();MD=null;ECI=null;R();}
function SECL(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.nome=gv("en");c.cognome=gv("ec2");c.email=gv("ee");c.tel=gv("et");c.dob=gv("ed");c.h=parseInt(gv("eh"))||c.h;sv();MD=null;R();}
function SMAC(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.macro={k:gn("mk")||c.macro.k,p:gn("mp")||c.macro.p,c:gn("mc")||c.macro.c,g:gn("mg")||c.macro.g,w:gn("mw")||c.macro.w};c.noM=gv("mn")==="true";sv();MD=null;R();}
function SEDT(cid){const c=CL.find(x=>x.id===cid);if(!c)return;if(gv("di"))c.start=gv("di");if(gv("ds2"))c.scadP=gv("ds2");sv();MD=null;R();}
function SEPN(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.obj=gv("po")||c.obj;c.euro=gn("pp")||c.euro;c.debt=gn("pd")||0;c.paid=gv("ppd")==="true";sv();MD=null;R();}
 
ld();R();
</script>
</body>
</html>
