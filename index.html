// -- JSONBIN CONFIG --
// Inserisci la tua API key JSONbin qui dopo la registrazione
// Istruzioni: vai su jsonbin.io -> Register -> API Keys -> copia X-Master-Key
const JSONBIN_KEY = "$2a$10$SZznKs.30tuPYFo5Mzkq3OG7tlnMpTJ92QkP3wNoyHPcpdUfOPmF2"; // es: "$2a$10$xxxx..."
const JSONBIN_BIN = "6a194fba21f9ee59d298bf02"; // ID del bin, es: "6650abc123..."

async function pushCheck(clienteId, ck){
  if(!JSONBIN_KEY || !JSONBIN_BIN) return;
  try {
    // Read current bin
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`, {
      headers: {"X-Master-Key": JSONBIN_KEY}
    });
    const data = await res.json();
    const current = data.record || {};
    if(!current.checks) current.checks = [];
    current.checks.push({clienteId, ck, ts: Date.now()});
    // Write back
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`, {
      method: "PUT",
      headers: {"Content-Type":"application/json","X-Master-Key": JSONBIN_KEY},
      body: JSON.stringify(current)
    });
  } catch(e){ console.log("JSONbin error:", e); }
}

async function pullChecks(){
  if(!JSONBIN_KEY || !JSONBIN_BIN) return 0;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`, {
      headers: {"X-Master-Key": JSONBIN_KEY}
    });
    const data = await res.json();
    const records = data.record?.checks || [];
    let imported = 0;
    records.forEach(r => {
      const c = CL.find(x => x.id === r.clienteId);
      if(c && r.ck) {
        const exists = c.checks.some(x => x.d === r.ck.d && Math.abs(x.w - r.ck.w) < 0.01);
        if(!exists){ c.checks.push(r.ck); c.checks.sort((a,b)=>a.d.localeCompare(b.d)); imported++; }
      }
    });
    if(imported > 0){ sv(); }
    return imported;
  } catch(e){ return 0; }
}

function analizza(c){
  const lk=c.checks[c.checks.length-1];if(!lk)return null;
  const ws=c.checks.map(x=>x.w);
  const d14=ws.length>1?(ws[ws.length-1]-ws[ws.length-2]):0;
  const obj=c.obj.toLowerCase();
  const bulk=obj.includes("bulk")||obj.includes("massa")||obj.includes("ingross");
  const cut=obj.includes("cut")||obj.includes("defin")||obj.includes("grasso");
  const alerts=[],exp=[],intc=[],next=[];
  if(lk.s<=5){alerts.push({t:"r",m:"\ud83d\udd34 SONNO CRITICO ("+lk.s+"/10) \u2014 GH secreto al 70% nelle prime 2h di sonno profondo. Con <6h: MPS cala del 18-25%, cortisolo elevato tutto il giorno, lipolisi bloccata."});intc.push("Magnesio bisglicinato 400mg 30min pre-sonno \u2014 abbassa cortisolo serale, migliora qualit\u00e0 REM (JCEM 2012).");}
  else if(lk.s<=6)alerts.push({t:"y",m:"\ud83d\udfe1 Sonno borderline ("+lk.s+"/10) \u2014 Puntare a 7-9h. GH e testosterone al picco tra le 22-02."});
  else alerts.push({t:"g",m:"\ud83d\udfe2 Sonno ottimale ("+lk.s+"/10) \u2014 Recupero ormonale nella norma."});
  if(lk.st>=8){alerts.push({t:"r",m:"\ud83d\udd34 STRESS CRONICO ("+lk.st+"/10) \u2014 Cortisolo >20 mcg/dL inibisce MPS del 20-30%, adiposit\u00e0 viscerale, testosterone \u221215-20%."});intc.push("Ashwagandha KSM-66 600mg/die \u2014 riduce cortisolo del 27.9% in 60 giorni (Chandrasekhar et al. 2012).");}
  else if(lk.st>=6)alerts.push({t:"y",m:"\ud83d\udfe1 Stress moderato ("+lk.st+"/10) \u2014 Il cortisolo cronico ostacola dimagrimento e recupero."});
  else alerts.push({t:"g",m:"\ud83d\udfe2 Stress controllato ("+lk.st+"/10) \u2014 Ambiente ormonale favorevole."});
  if(lk.e<=4){alerts.push({t:"r",m:"\ud83d\udd34 ENERGIA BASSA ("+lk.e+"/10) \u2014 Possibili cause: deficit eccessivo, carenza ferro/B12/D3, ipotiroidismo subclinico."});intc.push("Vitamina D3 4000 UI + K2 MK7 100mcg mattina \u2014 carenza D3 (<30ng/mL) causa affaticamento cronico e riduzione testosterone.");}
  else if(lk.e<=6)alerts.push({t:"y",m:"\ud83d\udfe1 Energia moderata ("+lk.e+"/10) \u2014 Ottimizzare timing carbo pre/post workout e idratazione."});
  else alerts.push({t:"g",m:"\ud83d\udfe2 Energia ottimale ("+lk.e+"/10) \u2014 Metabolismo energetico ben supportato."});
  if(lk.adh<60){alerts.push({t:"r",m:"\ud83d\udd34 ADERENZA CRITICA ("+lk.adh+"%) \u2014 Con compliance <60% impossibile valutare il protocollo."});next.push("Identificare i 2 momenti pi\u00f9 critici per l'aderenza e creare alternative pratiche. Semplicit\u00e0 batte perfezione.");}
  else if(lk.adh<75)alerts.push({t:"y",m:"\ud83d\udfe1 Aderenza migliorabile ("+lk.adh+"%) \u2014 Obiettivo: 80%+."});
  else alerts.push({t:"g",m:"\ud83d\udfe2 Ottima aderenza ("+lk.adh+"%) \u2014 La compliance \u00e8 il fattore pi\u00f9 predittivo del successo."});
  if(bulk){
    if(d14>1.5)alerts.push({t:"y",m:"\ud83d\udfe1 Bulk troppo rapido (+"+d14.toFixed(1)+"kg/2sett) \u2014 Velocit\u00e0 ottimale: 0.25-0.5kg/sett. Ridurre surplus di 200kcal."});
    else if(d14<0)alerts.push({t:"r",m:"\ud83d\udd34 Peso in calo in fase bulk \u2014 Non sei in surplus reale. Aumentare calorie di 200-300kcal/die."});
    else alerts.push({t:"g",m:"\ud83d\udfe2 Trend peso ottimale per il bulk (+"+d14.toFixed(1)+"kg/2sett)."});
    exp.push({i:"\ud83c\udfcb\ufe0f",t:"Surplus e Sintesi Proteica (MPS)",b:"Surplus ottimale per bulk lean: 200-350kcal/die. Distribuire proteine in 4-5 pasti (25-40g/pasto) per saturare il segnale mTOR. Carbo pre e post wo massimizzano insulina in fase anabolica."});
  } else if(cut){
    if(Math.abs(d14)>0.8&&d14<0)alerts.push({t:"y",m:"\ud83d\udfe1 Calo rapido ("+d14.toFixed(1)+"kg/2sett) \u2014 Rischio catabolismo. Deficit max: 500kcal/die. Verificare proteine (min 2.2g/kg)."});
    else if(d14<0&&d14>=-0.6)alerts.push({t:"g",m:"\ud83d\udfe2 Ritmo calo ottimale ("+d14.toFixed(1)+"kg/2sett) \u2014 Preservazione massa magra nella norma."});
    exp.push({i:"\ud83d\udd25",t:"Deficit e Preservazione Muscolare",b:"Deficit 15-20% sotto TDEE. Proteine a 2.2-2.4g/kg. Grassi NON sotto 1.0g/kg. Carbo principalmente attorno all'allenamento."});
  } else {
    exp.push({i:"\u2696\ufe0f",t:"Body Recomp \u2014 Strategia Avanzata",b:"Calorie vicino al mantenimento (\u00b110%) con ciclizzazione: giorni allenamento +200-300kcal (carbo), giorni riposo -200kcal. Proteine costanti 2.0-2.2g/kg."});
  }
  exp.push({i:"\ud83d\udca7",t:"Idratazione e Performance",b:`Target: ${c.macro.w||2.5}L/die. Disidratazione 2% = forza -10%, resistenza -20%. Formula: 35ml/kg + 500ml/ora allenamento + 2-3g sodio/die.`});
  exp.push({i:"\u26a1",t:"Timing Nutrizionale",b:"Pre-wo (90-120 min): carbo complessi + proteine veloci. Post-wo (entro 40-60 min): carbo alto IG + whey. Pre-sleep: caseina/ricotta per sintesi proteica notturna."});
  exp.push({i:"\ud83e\uddec",t:"Recupero e Supercompensazione",b:"Segnali di sovrallenamento: FC alta a riposo, RPE cronico >8, energia <5, performance in calo. In questi casi: deload immediato (-40% volume, -30% intensit\u00e0 per 1 settimana)."});
  if(!c.integ.some(x=>x.toLowerCase().includes("omega")))intc.push("Omega-3 EPA/DHA 2-3g/die con pasto \u2014 riduce infiammazione post-esercizio del 35%. Evidenza scientifica grado A.");
  if(!c.integ.some(x=>x.toLowerCase().includes("creatina")))intc.push("Creatina monoidrato 5g/die (sempre, senza cicli) \u2014 forza +5-15%, volume muscolare +1-2% in 4-8 settimane. Evidenza grado A.");
  if(!c.integ.some(x=>x.toLowerCase().includes("vitamina d")))intc.push("Vitamina D3 2000-4000 UI/die \u2014 70% degli italiani carente. Ottimale 50-80 ng/mL: testosterone pi\u00f9 alto, meno infortuni.");
  next.push(`Prossimo check tra ${c.checkFreq||14} giorni \u2014 link: ${getLink(c.id)}`);
  next.push("Protocollo: "+(lk.adh<75?"aderenza prioritaria prima di qualsiasi cambio macro.":"mantenere e valutare micro-aggiustamenti al prossimo check."));
  if((lk.rpe||0)>=9)next.push("RPE alto ("+lk.rpe+"/10): valutare settimana deload. Volume -40-50%, intensit\u00e0 -30%.");
  return{alerts,exp,intc,next};
}

    ["ETA",age(c.dob)+" anni","ALTEZZA",c.h+" cm"],

      doc.setFillColor(...cream);doc.roundedRect(x,y,hw,10,2,2,"F");

      doc.setTextColor(...textDark);doc.setFontSize(9);doc.setFont("helvetica","bold");doc.text(v,x+4,y+9);

  doc.text("ANDAMENTO PESO",M+7,y+5.5);y+=12;

  if(ws.length>=2){

    const chartW=CW,chartH=40,chartX=M,chartY=y;
    const mnW=Math.min(...ws)-1,mxW=Math.max(...ws)+1,rngW=mxW-mnW;

    // Background

    // Grid lines
    doc.setDrawColor(220,235,220);doc.setLineWidth(0.2);
    [0.25,0.5,0.75].forEach(frac=>{
      const gy2=chartY+chartH-frac*chartH;
      doc.line(chartX+4,gy2,chartX+chartW-4,gy2);
    });

    // Plot points and lines
    const pts=ws.map((w2,i)=>({
      x:chartX+6+(i/(ws.length-1))*(chartW-12),
      y:chartY+chartH-4-((w2-mnW)/rngW)*(chartH-8)
    }));

    // Fill area under curve
    doc.setFillColor(180,215,180);
    const fillPts=[[pts[0].x,chartY+chartH-3],...pts.map(p=>[p.x,p.y]),[pts[pts.length-1].x,chartY+chartH-3]];
    // Draw filled polygon manually
    doc.setFillColor(20,74,42,0.3);

    // Draw connecting lines
    doc.setDrawColor(...midGreen);doc.setLineWidth(1.5);
    for(let i=0;i<pts.length-1;i++){
      doc.line(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y);
    }

    // Draw points and labels
    pts.forEach((p,i)=>{
      doc.setFillColor(...gold);
      doc.circle(p.x,p.y,1.5,"F");
      // Weight label
      doc.setTextColor(...darkGreen);doc.setFontSize(7);doc.setFont("helvetica","bold");
      doc.text(ws[i]+"",p.x,p.y-3,{align:"center"});
      // Date label
      doc.setTextColor(...textGray);doc.setFontSize(6);doc.setFont("helvetica","normal");
      doc.text(fds(c.checks[i].d),p.x,chartY+chartH+4,{align:"center"});
    });

    y+=chartH+10;

    // Delta summary boxes
    const summaryItems=[
      ["Peso inizio",ws[0]+" kg"],
      ["Peso attuale",ws[ws.length-1]+" kg"],
      ["Variazione totale",(parseFloat(dTot)>=0?"+":"")+dTot+" kg"],
      ["N gradi check",ws.length+""]
    ];
    const sw=(CW-9)/4;
    summaryItems.forEach((s,i)=>{
      const sx=M+i*(sw+3);
      const isNeg=s[0]==="Variazione totale"&&parseFloat(dTot)<0;

    doc.setFillColor(...cream);doc.roundedRect(M,y,CW,12,3,3,"F");

      doc.setFillColor(...b[3]);doc.roundedRect(bx+3,by+7,(barW-6)*(b[1]/b[2]),3,1,1,"F");

    if(!c.noM&&c.macro.k>0){

      doc.setTextColor(...white);doc.setFontSize(9);doc.setFont("helvetica","bold");
      doc.text("TARGET MACRONUTRIENTI",M+7,y+5.5);y+=12;

      const macros=[
        ["CALORIE",c.macro.k+" kcal",[180,138,40],[180,138,40]],

        ["CARBOIDRATI",c.macro.c+"g",[13,110,110],[13,110,110]],
        ["GRASSI",c.macro.g+"g",[180,60,40],[180,60,40]],
        ["IDRATAZIONE",c.macro.w+"L",[60,100,180],[60,100,180]]
      ];
      const mw=(CW-4*4)/5;
      macros.forEach((m,i)=>{
        const mx=M+i*(mw+4);
        doc.setFillColor(...m[2]);doc.roundedRect(mx,y,mw,28,3,3,"F");
        doc.setTextColor(...white);doc.setFontSize(6.5);doc.setFont("helvetica","normal");
        doc.text(m[0],mx+mw/2,y+8,{align:"center"});
        doc.setFontSize(14);doc.setFont("helvetica","bold");
        doc.text(m[1],mx+mw/2,y+20,{align:"center"});
      });
      y+=34;

      // Macros visual breakdown
      const total=c.macro.p*4+c.macro.c*4+c.macro.g*9;
      if(total>0){
        y+=4;
        doc.setTextColor(...textGray);doc.setFontSize(8);doc.setFont("helvetica","normal");
        doc.text("Distribuzione calorica:",M,y+4);
        const barH=8;const barTotW=CW-50;
        const pPct=(c.macro.p*4/total);const cPct=(c.macro.c*4/total);const gPct=(c.macro.g*9/total);
        doc.setFillColor(20,160,96);doc.roundedRect(M+50,y,barTotW*pPct,barH,1,1,"F");
        doc.setFillColor(13,110,110);doc.rect(M+50+barTotW*pPct,y,barTotW*cPct,barH,"F");
        doc.setFillColor(180,60,40);doc.roundedRect(M+50+barTotW*pPct+barTotW*cPct,y,barTotW*gPct,barH,1,1,"F");
        doc.setTextColor(...textDark);doc.setFontSize(7);
        doc.text("P:"+Math.round(pPct*100)+"%",M+52+barTotW*pPct/2-3,y+5.5);
        doc.text("C:"+Math.round(cPct*100)+"%",M+52+barTotW*pPct+barTotW*cPct/2-3,y+5.5);
        doc.text("G:"+Math.round(gPct*100)+"%",M+52+barTotW*pPct+barTotW*cPct+barTotW*gPct/2-3,y+5.5);
        y+=16;
      }
    }

    if(c.integ.length>0){
      y+=4;
      doc.setFillColor(...darkGreen);doc.roundedRect(M,y,CW,8,2,2,"F");
      doc.setFillColor(...gold);doc.rect(M,y,3,8,"F");
      doc.setTextColor(...white);doc.setFontSize(9);doc.setFont("helvetica","bold");
      doc.text("STACK INTEGRATIVO",M+7,y+5.5);y+=12;
      c.integ.forEach((integ,i)=>{
        if(y>265){doc.addPage();y=M+10;}
        doc.setFillColor(...(i%2===0?cream:[240,248,242]));
        doc.roundedRect(M,y,CW,10,2,2,"F");
        doc.setFillColor(...gold);doc.circle(M+6,y+5,2,"F");
        doc.setTextColor(...textDark);doc.setFontSize(9);doc.setFont("helvetica","normal");
        doc.text(integ,M+12,y+6.5);
        y+=13;
      });
    }
  }

  // -- LAST PAGE: NOTE LEGALI --
  if(y>240){doc.addPage();y=M+10;}
  else y+=10;
  doc.setFillColor(...cream);doc.setDrawColor(...gold);doc.setLineWidth(0.5);
  doc.roundedRect(M,y,CW,26,3,3,"FD");
  doc.setFillColor(...gold);doc.rect(M,y,3,26,"F");
  doc.setTextColor(...gold);doc.setFontSize(8);doc.setFont("helvetica","bold");
  doc.text("NOTA LEGALE",M+7,y+7);
  doc.setTextColor(...textGray);doc.setFontSize(7.5);doc.setFont("helvetica","normal");
  doc.text("Documento redatto da Samuele Piolanti, studente di Scienze della Nutrizione (L-29).",M+7,y+13);
  doc.text("Ha finalit\u00e0 esclusivamente educative per soggetti adulti sani. Non costituisce diagnosi medica",M+7,y+19);
  doc.text("o prescrizione dietetica. In presenza di patologie consultare un medico o dietista iscritto all'albo.",M+7,y+25);

  doc.save("Report_"+c.nome+"_"+c.cognome+"_"+new Date().toISOString().split("T")[0]+".pdf");
}

let CF={e:0,s:0,st:0,rpe:0,gonf:0,umore:0};

function setRating(id, val){
  CF[id]=val;
  // Update only the rating buttons without re-rendering the whole form
  const rows=document.querySelectorAll(`[data-rating="${id}"]`);
  rows.forEach(btn=>{
    const bval=parseInt(btn.getAttribute("data-val"));
    if(bval===val){btn.className="rb sel";}else{btn.className="rb";}
  });
}

function ratingHTML(id){
  let h='<div class="rrow">';
  for(let i=1;i<=10;i++){
    h+=`<button class="rb${CF[id]===i?" sel":""}" data-rating="${id}" data-val="${i}" onclick="setRating('${id}',${i})">${i}</button>`;
  }
  h+='</div>';
  return h;
}

function submitForm(cid){
  const w=parseFloat(document.getElementById("cf_w")?.value||"0");

  const ck={
    d:new Date().toISOString().split("T")[0],
    w,e:CF.e,s:CF.s,st:CF.st,umore:CF.umore,gonf:CF.gonf,rpe:CF.rpe,
    pf:document.getElementById("cf_pf")?.value||"Stabili",
    pn:document.getElementById("cf_pn")?.value||"",

    adh:parseInt(document.getElementById("cf_adh")?.value||"0"),
    hy:parseFloat(document.getElementById("cf_hy")?.value||"0"),
    app:document.getElementById("cf_app")?.value||"",
    skip:document.getElementById("cf_skip")?.value||"no",

async function syncChecks(){
  const btn=document.querySelector('[onclick="syncChecks()"]');
  if(btn){btn.textContent="&#9203; Sync...";btn.disabled=true;}
  const n=await pullChecks();
  R();
  if(n>0)alert(`&#10003; Importati ${n} nuovi check dai clienti!`);
  else if(!JSONBIN_KEY)alert("JSONbin non configurato. Segui le istruzioni nel codice per abilitare la sincronizzazione automatica dei check.");
  else alert("Nessun nuovo check da importare.");
}

c.id})">Salva check</button></div>`;}

function mECK(c){const ck=c.checks[ECI];if(!ck)return"";return`<div class="mt">Modifica check #${ECI+1}</div><div class="g2"><div><label class="fl">Data</label><input id="cd" type="date" value="${ck.d}"></div><div><label class="fl">Peso (kg)</label><input id="cw" type="number" step="0.1" value="${ck.w||""}"></div></div><div class="g3"><div><label class="fl">Energia</label><input id="ce" type="number" value="${ck.e||""}"></div><div><label class="fl">Sonno</label><input id="cs" type="number" step="0.5" value="${ck.s||""}"></div><div><label class="fl">Stress</label><input id="cst" type="number" value="${ck.st||""}"></div><div><label class="fl">RPE</label><input id="cr" type="number" value="${ck.rpe||""}"></div><div><label class="fl">Idratazione (L)</label><input id="ch" type="number" step="0.1" value="${ck.hy||""}"></div><div><label class="fl">Aderenza (%)</label><input id="ca" type="number" value="${ck.adh||""}"></div><div><label class="fl">Ore sonno</label><input id="co" type="number" step="0.5" value="${ck.hs||""}"></div><div><label class="fl">FC riposo</label><input id="cfc" type="number" value="${ck.fc||""}"></div><div><label class="fl">Umore</label><input id="cum" type="number" value="${ck.umore||""}"></div><div><label class="fl">Gonfiore</label><input id="cgo" type="number" value="${ck.gonf||""}"></div></div><div class="g2"><div><label class="fl">Performance</label><select id="cp">${["Migliorate","Stabili","Peggiorate"].map(p=>`<option${p===ck.pf?" selected":""}>${p}</option>`).join("")}</select></div><div><label class="fl">Note perf.</label><input id="cpn" value="${ck.pn||""}"></div></div><div><label class="fl">Difficolt&#224;</label><input id="cdf" value="${ck.diff||""}"></div><div><label class="fl">Sensazione / Note</label><textarea id="cx" rows="2">${ck.sx||""}</textarea></div><div class="ma"><button class="btn bn" onclick="CM()">Annulla</button><button class="btn bg" style="flex:1" onclick="SECK(${c.id})">Salva</button></div>`;}

function mECL(c){return`<div class="mt">Modifica &#8212; ${c.nome}</div><div class="g2"><div><label class="fl">Nome</label><input id="en" value="${c.nome}"></div><div><label class="fl">Cognome</label><input id="ec2" value="${c.cognome}"></div><div><label class="fl">Email</label><input id="ee" value="${c.email}"></div><div><label class="fl">Telefono</label><input id="et" value="${c.tel||""}"></div><div><label class="fl">Anno nascita</label><input id="ed" value="${c.dob||""}"></div><div><label class="fl">Altezza (cm)</label><input id="eh" type="number" value="${c.h}"></div></div><div class="ma"><button class="btn bn" onclick="CM()">Annulla</button><button class="btn bg" style="flex:1" onclick="SECL(${c.id})">Salva</button></div>`;}
function mEMAC(c){return`<div class="mt">Macro &#8212; ${c.nome}</div><div class="g2"><div><label class="fl">Kcal</label><input id="mk" type="number" value="${c.macro.k}"></div><div><label class="fl">Proteine (g)</label><input id="mp" type="number" value="${c.macro.p}"></div><div><label class="fl">Carboidrati (g)</label><input id="mc" type="number" value="${c.macro.c}"></div><div><label class="fl">Grassi (g)</label><input id="mg" type="number" value="${c.macro.g}"></div><div><label class="fl">Idratazione (L)</label><input id="mw" type="number" step="0.1" value="${c.macro.w}"></div><div><label class="fl">Approccio</label><select id="mn"><option value="false"${!c.noM?" selected":""}>Con macro</option><option value="true"${c.noM?" selected":""}>Senza macro</option></select></div></div><div class="ma"><button class="btn bn" onclick="CM()">Annulla</button><button class="btn bg" style="flex:1" onclick="SMAC(${c.id})">Salva</button></div>`;}
function mEDT(c){return`<div class="mt">Date e Frequenza &#8212; ${c.nome}</div><div><label class="fl">Data inizio piano</label><input id="di" type="date" value="${c.start}"></div><div><label class="fl">Scadenza pagamento</label><input id="ds2" type="date" value="${c.scadP||""}"></div><div><label class="fl">Frequenza check</label><select id="dfreq">${[7,10,14,21,30].map(f=>`<option value="${f}"${(c.checkFreq||14)===f?" selected":""}>${f} giorni</option>`).join("")}</select></div><div class="ma"><button class="btn bn" onclick="CM()">Annulla</button><button class="btn bg" style="flex:1" onclick="SEDT(${c.id})">Salva</button></div>`;}
function mEPN(c){return`<div class="mt">Piano/Prezzo &#8212; ${c.nome}</div><div><label class="fl">Obiettivo</label><input id="po" value="${c.obj}"></div><div class="g2"><div><label class="fl">Prezzo totale (&#8364;)</label><input id="pp" type="number" value="${c.euro}"></div><div><label class="fl">Debito residuo (&#8364;)</label><input id="pd" type="number" value="${c.debt||0}"></div><div><label class="fl">Stato pagamento</label><select id="ppd"><option value="true"${c.paid?" selected":""}>Ricevuto</option><option value="false"${!c.paid?" selected":""}>In attesa</option></select></div></div><div class="ma"><button class="btn bn" onclick="CM()">Annulla</button><button class="btn bg" style="flex:1" onclick="SEPN(${c.id})">Salva</button></div>`;}

function rWA(c){const msg=(WA[WK]?.(c)||"");const link=`https://wa.me/${c.tel||""}?text=${encodeURIComponent(msg)}`;return`<div class="mbg" onclick="if(event.target===this)CM()"><div class="mbx"><div class="mt">WhatsApp &#8212; ${c.nome} ${c.cognome}</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">${Object.keys(WA).map(k=>`<button class="btn bn" style="${WK===k?"border-color:var(--gm);color:var(--g)":""};font-size:11px;padding:5px 10px" onclick="WK='${k}';document.getElementById('wamsg').value=(WA['${k}'](CL.find(x=>x.id===${c.id}))||'')">${{ck_rm:"&#128203; Check",py_rm:"&#128179; Pag.",welc:"&#128075; Benvenuto",ck_ok:"&#10003; OK",rin:"&#128260; Rinnovo"}[k]}</button>`).join("")}</div><label class="fl">Messaggio (modificabile)</label><textarea id="wamsg" rows="9" style="white-space:pre-wrap;margin-bottom:12px;font-size:13px">${msg}</textarea><div class="ma"><button class="btn bn" onclick="CM()">Chiudi</button><a href="${link}" target="_blank" rel="noreferrer" style="flex:2;text-decoration:none"><button class="btn bg" style="width:100%;justify-content:center">&#128242; Apri WhatsApp</button></a></div></div></div>`;}

const gv=id=>{const e=document.getElementById(id);return e?e.value:"";};
const gn=id=>{const v=parseFloat(gv(id));return isNaN(v)?null:v;};
const gi=id=>{const v=parseInt(gv(id));return isNaN(v)?0:v;};
function SC(id){SID=id;VW="cl";TAB="ov";ePiano=null;R();}
function GB(){VW="dash";SID=null;ePiano=null;R();}
function OM(m){MD=m;R();}
function CM(){MD=null;ECI=null;R();}
function ST(t){TAB=t;R();}
function OW(cid,k){SID=cid;WK=k;MD="wa";R();}
function TP(cid){const c=CL.find(x=>x.id===cid);if(c){c.paid=!c.paid;sv();R();}}
function EC(i){ECI=i;MD="eck";R();}
function DK(cid,i){if(!confirm("Eliminare questo check?"))return;const c=CL.find(x=>x.id===cid);if(c){c.checks.splice(i,1);sv();R();}}
function addInteg(cid){const v=prompt("Inserisci integratore:");if(!v)return;const c=CL.find(x=>x.id===cid);if(c){c.integ.push(v);sv();R();}}
function rmInteg(cid,i){const c=CL.find(x=>x.id===cid);if(c){c.integ.splice(i,1);sv();R();}}
function SUB(){const n=gv("fn"),cg=gv("fc");if(!n||!cg){alert("Nome e cognome obbligatori");return;}const pw=gn("fw");const st=new Date().toISOString().split("T")[0];const ap=gv("fap")||"on_off";CL.push({id:Date.now(),nome:n,cognome:cg,email:gv("fe"),tel:gv("ft"),dob:gv("fd2"),h:parseInt(gv("fh"))||0,sx:"M",obj:gv("fo"),note:"",euro:gn("fp")||0,scadP:gv("fs")||null,paid:document.getElementById("fpd")?.checked||false,start:st,checkFreq:parseInt(gv("ffreq"))||14,approccio:ap,noM:ap==="no_macro",integ:[],macro:{k:2000,p:150,c:200,g:65,w:2.5},checks:pw?[{d:st,w:pw,e:0,s:0,st:0,hy:0,adh:0,rpe:0,pf:"Stabili",sx:"",hs:0,fc:0,umore:0,gonf:0,diff:"",pn:""}]:[]});sv();MD=null;R();}
function SCK(cid){const c=CL.find(x=>x.id===cid);if(!c)return;const w=gn("cw");if(!w){alert("Peso obbligatorio");return;}c.checks.push({d:gv("cd"),w,e:gi("ce"),s:gn("cs")||0,st:gi("cst"),hy:gn("ch")||0,adh:gi("ca"),rpe:gi("cr"),pf:gv("cp")||"Stabili",pn:gv("cpn"),sx:gv("cx"),hs:gn("co")||0,fc:gi("cfc"),umore:gi("cum"),gonf:gi("cgo"),girovita:gn("cgv")||0,girofianchi:gn("cgh")||0,diff:gv("cdf"),foto:""});sv();MD=null;R();}
function SECK(cid){const c=CL.find(x=>x.id===cid);if(!c||ECI===null)return;const w=gn("cw");if(!w)return;c.checks[ECI]={...c.checks[ECI],d:gv("cd"),w,e:gi("ce"),s:gn("cs")||0,st:gi("cst"),hy:gn("ch")||0,adh:gi("ca"),rpe:gi("cr"),pf:gv("cp")||"Stabili",pn:gv("cpn"),sx:gv("cx"),hs:gn("co")||0,fc:gi("cfc"),umore:gi("cum"),gonf:gi("cgo"),diff:gv("cdf")};sv();MD=null;ECI=null;R();}
function SECL(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.nome=gv("en");c.cognome=gv("ec2");c.email=gv("ee");c.tel=gv("et");c.dob=gv("ed");c.h=parseInt(gv("eh"))||c.h;sv();MD=null;R();}
function SMAC(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.macro={k:gn("mk")||c.macro.k,p:gn("mp")||c.macro.p,c:gn("mc")||c.macro.c,g:gn("mg")||c.macro.g,w:gn("mw")||c.macro.w};c.noM=gv("mn")==="true";sv();MD=null;R();}
function SEDT(cid){const c=CL.find(x=>x.id===cid);if(!c)return;if(gv("di"))c.start=gv("di");if(gv("ds2"))c.scadP=gv("ds2");if(gv("dfreq"))c.checkFreq=parseInt(gv("dfreq"));sv();MD=null;R();}
function SEPN(cid){const c=CL.find(x=>x.id===cid);if(!c)return;c.obj=gv("po")||c.obj;c.euro=gn("pp")||c.euro;c.debt=gn("pd")||0;c.paid=gv("ppd")==="true";sv();MD=null;R();}

ld();R();
</script>
</body>
